<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tesla Battery Health</title>
<meta name="description" content="3D visualisation of Tesla battery degradation from a Tessie battery-health CSV export.">
<style>
  :root {
    color-scheme: dark;
    --bg:            #0d0d10;
    --surface:       rgba(19, 19, 24, 0.62);
    --border:        rgba(255, 255, 255, 0.09);
    --text-primary:  #f4f4f6;
    --text-secondary:#c3c2c7;
    --text-muted:    #8a8a92;
    --series:        #3987e5;
    --series-light:  #86b6ef;
    --delta-bad:     #e66767;
    --delta-good:    #35b46f;
    --font: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
  }
  #scene { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
  #labels { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
  .axis-label {
    position: absolute; top: 0; left: 0;
    font-size: 11px; letter-spacing: 0.04em;
    color: var(--text-muted);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    will-change: transform;
  }
  .axis-label.proj { color: var(--text-muted); font-style: italic; opacity: 0.9; }
  .axis-label.ann {
    color: var(--text-secondary); font-weight: 550;
    text-shadow: 0 1px 10px rgba(0,0,0,0.9);
    transition: opacity .35s;
  }

  /* ---------- HUD ---------- */
  #hud { position: fixed; inset: 0; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
  header {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 20px 24px 0;
    gap: 16px; flex-wrap: wrap;
  }
  .brand h1 {
    font-size: 15px; font-weight: 650; letter-spacing: 0.16em; text-transform: uppercase;
  }
  .brand .sub {
    margin-top: 5px; font-size: 12px; color: var(--text-muted); letter-spacing: 0.02em;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .vin {
    font-variant-numeric: tabular-nums;
    border: 1px solid var(--border); border-radius: 5px;
    padding: 2px 7px; font-size: 11px; color: var(--text-secondary);
    background: var(--surface);
  }
  .controls { display: flex; gap: 10px; pointer-events: auto; align-items: center; }
  .seg {
    display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
    background: var(--surface); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .seg button {
    all: unset; cursor: pointer; font-family: var(--font);
    font-size: 12px; padding: 7px 14px; color: var(--text-muted);
    transition: color .15s, background .15s;
  }
  .seg button:hover { color: var(--text-secondary); }
  .seg button[aria-pressed="true"] { color: var(--text-primary); background: rgba(255,255,255,0.08); }
  .btn {
    all: unset; cursor: pointer; font-family: var(--font);
    font-size: 12px; padding: 7px 14px; color: var(--text-secondary);
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    transition: color .15s, background .15s;
  }
  .btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.08); }

  /* ---------- Stats ---------- */
  .bottom { padding: 0 24px 18px; }
  .tiles {
    display: flex; gap: 10px; align-items: stretch;
    overflow-x: auto; scrollbar-width: none; pointer-events: auto;
    padding-bottom: 2px;
  }
  .tiles::-webkit-scrollbar { display: none; }
  .tile {
    background: var(--surface);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 16px 11px; min-width: 128px; flex: 0 0 auto;
  }
  .tile .label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.03em; margin-bottom: 5px; }
  .tile .value { font-size: 22px; font-weight: 620; letter-spacing: -0.01em; line-height: 1.1; }
  .tile .value small { font-size: 12px; font-weight: 480; color: var(--text-secondary); margin-left: 2px; }
  .tile .delta { margin-top: 4px; font-size: 11px; color: var(--text-muted); }
  .tile .delta .neg { color: var(--delta-bad); }
  .tile .delta .pos { color: var(--delta-good); }
  .tile.hero { padding-right: 22px; }
  .tile.hero .value { font-size: 40px; font-weight: 660; letter-spacing: -0.02em; }
  .tile.hero .value small { font-size: 15px; }
  .hint {
    margin-top: 10px; font-size: 11px; color: var(--text-muted); letter-spacing: 0.02em;
    display: flex; gap: 14px; flex-wrap: wrap;
  }
  .hint span::before { content: "·"; margin-right: 14px; color: rgba(255,255,255,0.2); }
  .hint span:first-child::before { content: none; margin: 0; }

  /* ---------- Tooltip ---------- */
  #tooltip {
    position: fixed; top: 0; left: 0; pointer-events: none;
    background: rgba(15, 15, 20, 0.88);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; font-size: 12px; min-width: 168px;
    opacity: 0; transition: opacity .12s;
    will-change: transform; z-index: 10;
  }
  #tooltip.on { opacity: 1; }
  #tooltip .tt-date { color: var(--text-primary); font-weight: 600; margin-bottom: 6px; }
  #tooltip .tt-row { display: flex; justify-content: space-between; gap: 16px; color: var(--text-muted); line-height: 1.65; }
  #tooltip .tt-row b { color: var(--text-secondary); font-weight: 520; font-variant-numeric: tabular-nums; }
  #tooltip .tt-health b { color: var(--text-primary); }

  /* ---------- Drop overlay ---------- */
  #drop {
    position: fixed; inset: 0; z-index: 20; display: none;
    align-items: center; justify-content: center;
    background: rgba(13, 13, 16, 0.8); backdrop-filter: blur(6px);
  }
  #drop.on { display: flex; }
  #drop .box {
    border: 1.5px dashed rgba(255,255,255,0.3); border-radius: 16px;
    padding: 46px 64px; font-size: 15px; color: var(--text-secondary);
  }
  #toast {
    position: fixed; left: 50%; bottom: 130px; transform: translateX(-50%);
    background: rgba(15,15,20,0.9); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 16px; font-size: 13px; color: var(--text-secondary);
    opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 30;
  }
  #toast.on { opacity: 1; }

  @media (max-width: 700px) {
    header { padding: 14px 14px 0; }
    .bottom { padding: 0 14px 12px; }
    .tile.hero .value { font-size: 30px; }
    .hint span:nth-child(n+2) { display: none; }
  }
</style>
</head>
<body>

<canvas id="scene"></canvas>
<div id="labels"></div>

<div id="hud">
  <header>
    <div class="brand">
      <h1>Tesla Battery Health</h1>
      <div class="sub">
        <span id="vin" class="vin"></span>
        <span id="range-note"></span>
      </div>
    </div>
    <div class="controls">
      <div class="seg" role="group" aria-label="Distance unit">
        <button id="unit-km" aria-pressed="true">km</button>
        <button id="unit-mi" aria-pressed="false">mi</button>
      </div>
      <div class="seg" role="group" aria-label="X axis">
        <button id="mode-odo" aria-pressed="true">Odometer</button>
        <button id="mode-time" aria-pressed="false">Time</button>
      </div>
      <button class="btn" id="load-btn">Load CSV</button>
      <input type="file" id="file-input" accept=".csv,text/csv" hidden>
    </div>
  </header>

  <div class="bottom">
    <div class="tiles" id="tiles"></div>
    <div class="hint">
      <span>Drag &amp; drop a Tessie battery CSV anywhere</span>
      <span>Hover points for detail</span>
    </div>
  </div>
</div>

<div id="tooltip"></div>
<div id="drop"><div class="box">Drop your Tessie battery CSV</div></div>
<div id="toast"></div>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

/* ================= data ================= */

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return null;
  const parseLine = (l) => {
    const out = []; let cur = '', inQ = false;
    for (let i = 0; i < l.length; i++) {
      const c = l[i];
      if (inQ) {
        if (c === '"') { if (l[i + 1] === '"') { cur += '"'; i++; } else inQ = false; }
        else cur += c;
      } else if (c === '"') inQ = true;
      else if (c === ',') { out.push(cur); cur = ''; }
      else cur += c;
    }
    out.push(cur);
    return out;
  };
  const header = parseLine(lines[0]).map(h => h.toLowerCase());
  const col = (name) => header.findIndex(h => h.includes(name));
  const iT = col('timestamp'), iO = col('odometer'), iR = col('max range'), iC = col('usable capacity');
  if (iT < 0 || iO < 0 || iC < 0) return null;
  const unit = /\(km\)/.test(header[iO]) ? 'km' : 'mi';
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const f = parseLine(lines[i]);
    const date = new Date(f[iT].replace(' ', 'T'));
    const odo = parseFloat(f[iO]), range = iR >= 0 ? parseFloat(f[iR]) : NaN, cap = parseFloat(f[iC]);
    if (isNaN(date) || !isFinite(odo) || !isFinite(cap) || cap <= 1) continue;
    rows.push({ date, odo, range, cap });
  }
  rows.sort((a, b) => a.odo - b.odo);
  return rows.length >= 5 ? { rows, unit } : null;
}

function movingAvg(vals, w) {
  const half = Math.floor(w / 2), out = new Array(vals.length);
  for (let i = 0; i < vals.length; i++) {
    let s = 0, n = 0;
    for (let j = Math.max(0, i - half); j <= Math.min(vals.length - 1, i + half); j++) { s += vals[j]; n++; }
    out[i] = s / n;
  }
  return out;
}

function linreg(xs, ys) {
  const n = xs.length;
  let sx = 0, sy = 0, sxx = 0, sxy = 0;
  for (let i = 0; i < n; i++) { sx += xs[i]; sy += ys[i]; sxx += xs[i] * xs[i]; sxy += xs[i] * ys[i]; }
  const b = (n * sxy - sx * sy) / (n * sxx - sx * sx);
  return { a: (sy - b * sx) / n, b };
}

function analyse(rows) {
  const caps = rows.map(r => r.cap);
  const smooth = movingAvg(caps, 9);
  const baseline = Math.max(...smooth);
  const current = smooth[smooth.length - 1];
  const first = rows[0], last = rows[rows.length - 1];
  const ranges = rows.map(r => r.range).filter(v => isFinite(v) && v > 0);
  const rangeSmooth = movingAvg(rows.map(r => (isFinite(r.range) && r.range > 0) ? r.range : NaN)
    .map((v, i, a) => isFinite(v) ? v : a[i - 1] ?? ranges[0]), 9);
  // trend over the most recent half of the span (steadier than the early break-in drop)
  const midOdo = first.odo + (last.odo - first.odo) / 2;
  const recentIdx = rows.map((r, i) => i).filter(i => rows[i].odo >= midOdo);
  const reg = linreg(recentIdx.map(i => rows[i].odo), recentIdx.map(i => smooth[i]));
  const regAll = linreg(rows.map(r => r.odo), smooth);
  // same regressions against time, in years
  const years = rows.map(r => +r.date / (1000 * 3600 * 24 * 365.25));
  const midT = years[0] + (years[years.length - 1] - years[0]) / 2;
  const recentTIdx = rows.map((r, i) => i).filter(i => years[i] >= midT);
  const regT = linreg(recentTIdx.map(i => years[i]), recentTIdx.map(i => smooth[i]));
  const regTAll = linreg(years, smooth);
  return {
    smooth, baseline, current,
    healthPct: current / baseline * 100,
    lostKwh: baseline - current,
    rangeNow: rangeSmooth[rangeSmooth.length - 1],
    rangePeak: Math.max(...rangeSmooth),
    milesTracked: last.odo - first.odo,
    monthsTracked: (last.date - first.date) / (1000 * 3600 * 24 * 30.44),
    trendRecent: reg.b * 10000,       // kWh per 10k distance units, recent half
    trendAll: regAll.b * 10000,
    trendRecentYr: regT.b,            // kWh per year, recent half
    trendAllYr: regTAll.b,
    reg,
  };
}

const scene = new THREE.Scene();

function fitCamera() {
  // distance that fits the full chart width for the current aspect ratio
  const halfFovTan = Math.tan(THREE.MathUtils.degToRad(camera.fov / 2));
  const dist = THREE.MathUtils.clamp((LEN * 0.62) / (halfFovTan * camera.aspect), 66, 260);
  CAM_TO.copy(CAM_TARGET).addScaledVector(CAM_DIR, dist);
  CAM_FROM.copy(CAM_TARGET).addScaledVector(CAM_DIR, dist * 1.5).add(new THREE.Vector3(30, 42, 0));
}

function addLabel(text, pos, cls = '', anchor = '-50%,-50%') {

let state = null;  // { rows, unit, stats, mode, group, pointMeshData, tube, curtainMat, ... }

function niceTicks(min, max, target, steps = [1, 2, 2.5, 5, 10]) {
  const span = max - min;
  const mag = Math.pow(10, Math.floor(Math.log10(span / target)));
  let best = mag;
  for (const s of steps) { if (span / (s * mag) >= target - 2) best = s * mag; }
  const ticks = [];
  for (let v = Math.ceil(min / best) * best; v <= max + 1e-9; v += best) ticks.push(v);
  return ticks;
}

function buildChart(rows, unit, stats, mode) {

  if (state?.group) {
    state.group.traverse(o => { o.geometry?.dispose(); o.material?.dispose?.(); });
    scene.remove(state.group);

  const x1 = mode === 'odo' ? last.odo + projPad : +last.date;

  const gridVerts = [];
  const yTicks = niceTicks(yLo, yHi, 4, [1, 2, 5]).filter(v => v > yLo + 0.15 && v < yHi - 0.15);
  for (const v of yTicks) {
    const y = Y(v);
    gridVerts.push(0, y, WALL_Z, LEN, y, WALL_Z);
    addLabel(`${fmtInt.format(v)} kWh`, new THREE.Vector3(-1.8, y, WALL_Z), '', '-100%,-50%');
  }
  let xTickVals;
  if (mode === 'odo') {
    xTickVals = niceTicks(first.odo, last.odo, 6).map(v => ({ v, t: kFmt(Math.round(v)) + ' ' + unit }));
  } else {
    xTickVals = [];
    const d = new Date(first.date); d.setDate(1); d.setMonth(d.getMonth() + 1);
    const spanM = (last.date - first.date) / (1000 * 3600 * 24 * 30.44);
    const stepM = Math.max(1, Math.round(spanM / 7));
    for (; d <= last.date; d.setMonth(d.getMonth() + stepM)) {
      xTickVals.push({ v: +d, t: `${fmtMonth.format(d)} ’${String(d.getFullYear()).slice(2)}` });
    }
  }
  for (const { v, t } of xTickVals) {
    const x = X(v);
    gridVerts.push(x, 0, WALL_Z, x, 0, FLOOR_FRONT);
    addLabel(t, new THREE.Vector3(x, -1.1, FLOOR_FRONT + 0.5));
  }
  const gridGeo = new THREE.BufferGeometry();
  gridGeo.setAttribute('position', new THREE.Float32BufferAttribute(gridVerts, 3));
  group.add(new THREE.LineSegments(gridGeo, new THREE.LineBasicMaterial({ color: C.grid, transparent: true, opacity: 0.85 })));

  // baseline (floor edge) — slightly brighter
  const baseGeo = new THREE.BufferGeometry();
  baseGeo.setAttribute('position', new THREE.Float32BufferAttribute([0, 0, WALL_Z, 0, 0, FLOOR_FRONT, LEN, 0, WALL_Z, LEN, 0, FLOOR_FRONT, 0, 0, 0, LEN, 0, 0], 3));
  group.add(new THREE.LineSegments(baseGeo, new THREE.LineBasicMaterial({ color: C.gridBright })));

  /* ----- smoothed capacity curve → glowing tube ----- */
  const pts = rows.map((r, i) => new THREE.Vector3(X(xOf(r)), Y(stats.smooth[i]), 0));
  const curve = new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.1);
  const SEGS = 480;
  const tubeGeo = new THREE.TubeGeometry(curve, SEGS, 0.19, 10, false);
  const vCount = tubeGeo.attributes.position.count;
  const colors = new Float32Array(vCount * 3);
  const cA = C.seriesLight, cB = C.series, tmp = new THREE.Color();
  const perRing = vCount / (SEGS + 1);
  for (let i = 0; i < vCount; i++) {
    const t = Math.floor(i / perRing) / SEGS;
    tmp.copy(cA).lerp(cB, Math.pow(t, 0.8)).multiplyScalar(1.25);
    colors[i * 3] = tmp.r; colors[i * 3 + 1] = tmp.g; colors[i * 3 + 2] = tmp.b;
  }
  tubeGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const tube = new THREE.Mesh(tubeGeo, new THREE.MeshBasicMaterial({ vertexColors: true, toneMapped: false }));
  group.add(tube);

  /* ----- gradient curtain under the curve ----- */
  const n = rows.length;
  const cPos = new Float32Array(n * 2 * 3), cUV = new Float32Array(n * 2 * 2);
  for (let i = 0; i < n; i++) {
    const p = pts[i], u = i / (n - 1);
    cPos.set([p.x, p.y, 0, p.x, 0, 0], i * 6);
    cUV.set([u, 1, u, 0], i * 4);
  }
  const cIdx = [];
  for (let i = 0; i < n - 1; i++) {
    const a = i * 2, b = i * 2 + 1, c2 = i * 2 + 2, d = i * 2 + 3;
    cIdx.push(a, b, c2, b, d, c2);
  }
  const curtainGeo = new THREE.BufferGeometry();
  curtainGeo.setAttribute('position', new THREE.BufferAttribute(cPos, 3));
  curtainGeo.setAttribute('uv', new THREE.BufferAttribute(cUV, 2));
  curtainGeo.setIndex(cIdx);
  const curtainMat = new THREE.ShaderMaterial({
    transparent: true, depthWrite: false, side: THREE.DoubleSide,
    uniforms: { uColor: { value: C.series }, uProgress: { value: 0 } },
    vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader: `
      uniform vec3 uColor; uniform float uProgress; varying vec2 vUv;
      void main(){
        if (vUv.x > uProgress) discard;
        float a = pow(vUv.y, 1.6) * 0.30;
        gl_FragColor = vec4(uColor, a);
      }`,
  });
  group.add(new THREE.Mesh(curtainGeo, curtainMat));

  /* ----- raw readings as instanced dots ----- */
  const dotGeo = new THREE.SphereGeometry(0.14, 10, 8);
  const dots = new THREE.InstancedMesh(dotGeo, new THREE.MeshBasicMaterial({
    color: C.point, transparent: true, opacity: 0.8, toneMapped: false,
  }), n);
  const dotPts = rows.map((r) => new THREE.Vector3(X(xOf(r)), Y(r.cap), 0));
  const m4 = new THREE.Matrix4();
  for (let i = 0; i < n; i++) { m4.makeScale(0.0001, 0.0001, 0.0001).setPosition(dotPts[i]); dots.setMatrixAt(i, m4); }
  group.add(dots);

  /* ----- projection (odometer mode) ----- */
  if (mode === 'odo' && projPad > 0) {
    const lastP = pts[n - 1];
    const capProj = stats.reg.a + stats.reg.b * (last.odo + projPad);
    const projGeo = new THREE.BufferGeometry().setFromPoints([
      lastP, new THREE.Vector3(LEN, Y(capProj), 0),
    ]);
    const projLine = new THREE.Line(projGeo, new THREE.LineDashedMaterial({
      color: C.proj, dashSize: 0.9, gapSize: 0.7, transparent: true, opacity: 0.7,
    }));
    projLine.computeLineDistances();
    group.add(projLine);
    addLabel('trend →', new THREE.Vector3(LEN + 0.8, Y(capProj), 0), 'proj', '0%,-50%');
  }

  /* ----- "now" marker ----- */
  const endP = pts[n - 1];
  const endDot = new THREE.Mesh(new THREE.SphereGeometry(0.42, 20, 14),
    new THREE.MeshBasicMaterial({ color: C.end, toneMapped: false }));
  endDot.position.copy(endP);
  group.add(endDot);
  const halo = new THREE.Mesh(new THREE.SphereGeometry(0.42, 20, 14),
    new THREE.MeshBasicMaterial({ color: C.series, transparent: true, opacity: 0.25, toneMapped: false }));
  halo.position.copy(endP);
  group.add(halo);
  addLabel(`${stats.healthPct.toFixed(1)}%`, endP.clone().add(new THREE.Vector3(0, 1.9, 0)), '');
  worldLabels[worldLabels.length - 1].el.style.cssText = 'color:var(--text-primary);font-weight:640;font-size:14px;';

  /* ----- 3D annotations: peak & outliers lift out of the chart plane ----- */
  const annotations = [];
  function annotate(point, text, lift, main) {
    const top = point.clone().setZ(lift);
    const line = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([point, top]),
      new THREE.LineBasicMaterial({ color: C.seriesLight, transparent: true, opacity: 0.4 }));
    const dot = new THREE.Mesh(new THREE.SphereGeometry(main ? 0.22 : 0.16, 12, 8),
      new THREE.MeshBasicMaterial({ color: main ? C.end : C.seriesLight, toneMapped: false }));
    dot.position.copy(top);
    line.visible = dot.visible = false;
    group.add(line, dot);
    addLabel(text, top.clone().add(new THREE.Vector3(0, 1.0, 0)), 'ann', '-50%,-100%');
    const el = worldLabels[worldLabels.length - 1].el;
    el.style.opacity = '0';
    annotations.push({ u: point.x / LEN, objs: [line, dot], el });
  }

  const peakIdx = stats.smooth.indexOf(Math.max(...stats.smooth));
  annotate(pts[peakIdx], `peak ${fmt1.format(stats.baseline)} kWh`, 7, true);

  // outliers = raw readings furthest off the smoothed curve
  const residuals = rows.map((r, i) => r.cap - stats.smooth[i]);
  const sd = Math.sqrt(residuals.reduce((s, v) => s + v * v, 0) / residuals.length);
  const thresh = Math.max(0.3, 2.4 * sd);
  const order = residuals.map((_, i) => i).sort((a, b) => Math.abs(residuals[b]) - Math.abs(residuals[a]));
  const picked = [];
  for (const i of order) {
    if (Math.abs(residuals[i]) < thresh || picked.length >= 3) break;
    if ([peakIdx, ...picked].some(j => Math.abs(dotPts[i].x - dotPts[j].x) < LEN * 0.11)) continue;
    picked.push(i);
    annotate(dotPts[i],
      `${residuals[i] > 0 ? '+' : '−'}${fmt1.format(Math.abs(residuals[i]))} kWh outlier`, 5, false);
  }

  // hover highlight
  const hover = new THREE.Mesh(new THREE.SphereGeometry(0.3, 14, 10),
    new THREE.MeshBasicMaterial({ color: 0xffffff, toneMapped: false }));
  hover.visible = false;
  group.add(hover);

  scene.add(group);
  state = {
    rows, unit, stats, mode, group, tube, curtainMat, dots, dotPts, endDot, halo, hover, annotations,
    idxTotal: tubeGeo.index.count,
    dotU: rows.map((r) => (X(xOf(r))) / LEN),
    endU: X(xOf(last)) / LEN,
  };
  progress = 0;
  progressStart = clock.getElapsedTime();
}

/* ================= HUD ================= */

function deltaSpan(v, unitStr, invertGood = false) {
  const good = invertGood ? v < 0 : v > 0;
  const cls = v === 0 ? '' : good ? 'pos' : 'neg';
  const sign = v > 0 ? '+' : '−';
  return `<span class="${cls}">${sign}${fmt1.format(Math.abs(v))}${unitStr}</span>`;
}

function renderStats(rows, unit, stats, vin, mode) {
  const last = rows[rows.length - 1];
  document.getElementById('vin').textContent = vin || 'Tessie export';
  document.getElementById('range-note').textContent =
    `${fmtDate.format(rows[0].date)} – ${fmtDate.format(last.date)} · ${rows.length} readings`;
  const tiles = [
    {
      hero: true, label: 'Battery health',
      value: `${stats.healthPct.toFixed(1)}<small>%</small>`,
      delta: `${deltaSpan(-(100 - stats.healthPct), '%')} vs peak recorded`,
    },
    {
      label: 'Usable capacity',
      value: `${fmt1.format(stats.current)}<small>kWh</small>`,
      delta: `${deltaSpan(-stats.lostKwh, ' kWh')} vs ${fmt1.format(stats.baseline)} peak`,
    },
    {
      label: 'Est. max range',
      value: `${Math.round(stats.rangeNow)}<small>${unit}</small>`,
      delta: `${deltaSpan(stats.rangeNow - stats.rangePeak, ` ${unit}`)} vs ${Math.round(stats.rangePeak)} peak`,
    },
    {
      label: 'Odometer',
      value: `${fmtInt.format(Math.round(last.odo))}<small>${unit}</small>`,
      delta: `${kFmt(Math.round(stats.milesTracked))} ${unit} over ${Math.round(stats.monthsTracked)} mo tracked`,
    },
    mode === 'time' ? {
      label: 'Degradation trend',
      value: `${fmt1.format(Math.abs(stats.trendRecentYr))}<small>kWh / yr</small>`,
      delta: `recent · ${fmt1.format(Math.abs(stats.trendAllYr))} kWh/yr overall`,
    } : {
      label: 'Degradation trend',
      value: `${fmt1.format(Math.abs(stats.trendRecent))}<small>kWh / 10k ${unit}</small>`,
      delta: `recent · ${fmt1.format(Math.abs(stats.trendAll))} kWh/10k ${unit} overall`,
    },
  ];
  document.getElementById('tiles').innerHTML = tiles.map(t => `
    <div class="tile${t.hero ? ' hero' : ''}">
      <div class="label">${t.label}</div>
      <div class="value">${t.value}</div>
      <div class="delta">${t.delta}</div>
    </div>`).join('');
}

/* ================= interaction ================= */

const tooltip = document.getElementById('tooltip');
const ptr = { x: -1e4, y: -1e4, inside: false };
const parallax = { x: 0, y: 0 };
canvas.addEventListener('pointermove', (e) => { ptr.x = e.clientX; ptr.y = e.clientY; ptr.inside = true; });
canvas.addEventListener('pointerleave', () => { ptr.inside = false; });

const projV = new THREE.Vector3();
function updateHover() {
  if (!state || !ptr.inside || progress < 1) { tooltip.classList.remove('on'); if (state) state.hover.visible = false; return; }
  const { rows, dotPts, hover, unit, stats } = state;
  const w = window.innerWidth, h = window.innerHeight;
  let best = -1, bestD = 26 * 26;
  for (let i = 0; i < dotPts.length; i++) {
    projV.copy(dotPts[i]).project(camera);
    if (projV.z > 1) continue;
    const sx = (projV.x * 0.5 + 0.5) * w, sy = (-projV.y * 0.5 + 0.5) * h;
    const d = (sx - ptr.x) ** 2 + (sy - ptr.y) ** 2;
    if (d < bestD) { bestD = d; best = i; }
  }
  if (best < 0) { tooltip.classList.remove('on'); hover.visible = false; return; }
  const r = rows[best];
  hover.position.copy(dotPts[best]);
  hover.visible = true;
  tooltip.innerHTML = `
    <div class="tt-date">${fmtDate.format(r.date)}</div>
    <div class="tt-row tt-health"><span>Health</span><b>${(r.cap / stats.baseline * 100).toFixed(1)}%</b></div>
    <div class="tt-row"><span>Capacity</span><b>${fmt1.format(r.cap)} kWh</b></div>
    ${isFinite(r.range) && r.range > 0 ? `<div class="tt-row"><span>Max range</span><b>${Math.round(r.range)} ${unit}</b></div>` : ''}
    <div class="tt-row"><span>Odometer</span><b>${fmtInt.format(Math.round(r.odo))} ${unit}</b></div>`;
  const tx = Math.min(ptr.x + 18, w - 200), ty = Math.max(12, ptr.y - 30 - tooltip.offsetHeight * 0.0);
  tooltip.style.transform = `translate(${tx}px, ${Math.min(ty, h - tooltip.offsetHeight - 12)}px)`;
  tooltip.classList.add('on');
}

/* ================= render loop ================= */

const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
const INTRO_S = 2.2, DRAW_S = 2.4;
let introDone = false;

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // camera intro
  if (!introDone) {
    const k = Math.min(1, t / INTRO_S);
    camera.position.lerpVectors(CAM_FROM, CAM_TO, easeOutCubic(k));
    camera.lookAt(CAM_TARGET);
    if (k >= 1) introDone = true;
  }

  // flat front view: gentle drift + pointer parallax, no orbiting
  if (introDone) {
    const nx = ptr.inside ? (ptr.x / window.innerWidth - 0.5) * 2 : 0;
    const ny = ptr.inside ? (ptr.y / window.innerHeight - 0.5) * 2 : 0;
    parallax.x += (nx - parallax.x) * 0.035;
    parallax.y += (ny - parallax.y) * 0.035;
    camera.position.copy(CAM_TO);
    camera.position.x += Math.sin(t * 0.16) * 0.8 + parallax.x * 2.6;
    camera.position.y += Math.sin(t * 0.11) * 0.5 - parallax.y * 1.6;
    camera.lookAt(CAM_TARGET);
  }

  if (state) {
    // draw-in progress
    const k = Math.min(1, (t - progressStart) / DRAW_S);
    const p = easeOutCubic(k);
    if (p !== progress || k < 1) {
      progress = p;
      const idx = Math.floor(state.idxTotal * Math.min(1, progress / Math.max(state.endU, 1e-6)) / 3) * 3;
      state.tube.geometry.setDrawRange(0, Math.min(idx, state.idxTotal));
      state.curtainMat.uniforms.uProgress.value = progress / Math.max(state.endU, 1e-6);
      const m4 = new THREE.Matrix4();
      for (let i = 0; i < state.dotPts.length; i++) {
        const on = state.dotU[i] <= progress;
        m4.makeScale(on ? 1 : 1e-4, on ? 1 : 1e-4, on ? 1 : 1e-4).setPosition(state.dotPts[i]);
        state.dots.setMatrixAt(i, m4);
      }
      state.dots.instanceMatrix.needsUpdate = true;
      const endOn = progress >= state.endU - 1e-3;
      state.endDot.visible = endOn;
      state.halo.visible = endOn;
      for (const a of state.annotations) {
        const on = progress >= a.u;
        a.objs.forEach(o => { o.visible = on; });
        a.el.style.opacity = on ? '1' : '0';
      }
    }
    // pulse
    const s = 1 + Math.sin(t * 2.2) * 0.5 + 0.5;
    state.halo.scale.setScalar(1.4 + s * 1.1);
    state.halo.material.opacity = 0.28 - s * 0.16;
  }

  composer.render();

  // project HTML labels
  const w = window.innerWidth, h = window.innerHeight;
  for (const { pos, el, anchor } of worldLabels) {
    projV.copy(pos).project(camera);
    if (projV.z > 1 || Math.abs(projV.x) > 1.2 || Math.abs(projV.y) > 1.2) { el.style.display = 'none'; continue; }
    el.style.display = '';
    el.style.transform = `translate(${anchor}) translate(${(projV.x * 0.5 + 0.5) * w}px, ${(-projV.y * 0.5 + 0.5) * h}px)`;
  }
  updateHover();
}
animate();

/* ================= app wiring ================= */

let native = null, currentVin = '', mode = 'odo', dispUnit = 'km';
const KM_PER_MI = 1.609344;

function refresh() {
  if (!native) return;
  const f = native.unit === dispUnit ? 1 : (native.unit === 'mi' ? KM_PER_MI : 1 / KM_PER_MI);
  const rows = f === 1 ? native.rows
    : native.rows.map(r => ({ ...r, odo: r.odo * f, range: r.range * f }));
  const stats = analyse(rows);
  renderStats(rows, dispUnit, stats, currentVin, mode);
  buildChart(rows, dispUnit, stats, mode);
}

function load(rows, unit, vin) {
  native = { rows, unit };
  currentVin = vin;
  refresh();
}

const modeBtns = { odo: document.getElementById('mode-odo'), time: document.getElementById('mode-time') };
function setMode(m) {
  if (m === mode || !native) return;
  mode = m;
  modeBtns.odo.setAttribute('aria-pressed', String(m === 'odo'));
  modeBtns.time.setAttribute('aria-pressed', String(m === 'time'));
  refresh();
}
modeBtns.odo.addEventListener('click', () => setMode('odo'));
modeBtns.time.addEventListener('click', () => setMode('time'));

const unitBtns = { km: document.getElementById('unit-km'), mi: document.getElementById('unit-mi') };
function setUnit(u) {
  if (u === dispUnit || !native) return;
  dispUnit = u;
  unitBtns.km.setAttribute('aria-pressed', String(u === 'km'));
  unitBtns.mi.setAttribute('aria-pressed', String(u === 'mi'));
  refresh();
}
unitBtns.km.addEventListener('click', () => setUnit('km'));
unitBtns.mi.addEventListener('click', () => setUnit('mi'));

const toast = document.getElementById('toast');
let toastT = 0;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('on');
  clearTimeout(toastT);
  toastT = setTimeout(() => toast.classList.remove('on'), 3200);
}

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    const parsed = parseCSV(String(reader.result));
    if (!parsed) { showToast('Could not read that file — expected a Tessie battery-health CSV.'); return; }
    const vinMatch = file.name.match(/[A-HJ-NPR-Z0-9]{17}/i);
    load(parsed.rows, parsed.unit, vinMatch ? vinMatch[0].toUpperCase() : file.name.replace(/\.csv$/i, ''));
    showToast(`Loaded ${parsed.rows.length} readings.`);
  };
  reader.readAsText(file);
}

document.getElementById('load-btn').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change', (e) => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
  e.target.value = '';
});

const drop = document.getElementById('drop');
let dragDepth = 0;
window.addEventListener('dragenter', (e) => { e.preventDefault(); dragDepth++; drop.classList.add('on'); });
window.addEventListener('dragleave', (e) => { e.preventDefault(); if (--dragDepth <= 0) { dragDepth = 0; drop.classList.remove('on'); } });
window.addEventListener('dragover', (e) => e.preventDefault());
window.addEventListener('drop', (e) => {
  e.preventDefault();
  dragDepth = 0;
  drop.classList.remove('on');
  const f = e.dataTransfer.files?.[0];
  if (f) loadFile(f);
});

/* boot with the embedded sample */
{
  const parsed = parseCSV(document.getElementById('default-csv').textContent);
  if (parsed) load(parsed.rows, parsed.unit, document.body.dataset.vin || 'LRW3F7EB4MCXXXXXX');
}
</script>
</body>
