<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tesla Battery Health</title>
<meta name="description" content="Interactive visualisation of Tesla battery degradation from a Tessie battery-health CSV export.">
<style>
  :root {
    color-scheme: dark;
    --bg:            #0d0d10;
    --surface:       rgba(19, 19, 24, 0.62);
    --border:        rgba(255, 255, 255, 0.09);
    --text-primary:  #f4f4f6;
    --text-secondary:#c3c2c7;
    --text-muted:    #8a8a92;
    --series:        #3987e5;
    --series-light:  #86b6ef;
    --dot:           #6da7ec;
    --grid:          #202027;
    --baseline:      #2e2e36;
    --crosshair:     #45454e;
    --delta-bad:     #e66767;
    --delta-good:    #35b46f;
    --font: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: radial-gradient(120% 90% at 50% 0%, #131319 0%, var(--bg) 55%, #0a0a0c 100%);
    color: var(--text-primary);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
  }
  #app { height: 100dvh; display: flex; flex-direction: column; }

  /* ---------- header ---------- */
  header {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 20px 24px 8px;
    gap: 16px; flex-wrap: wrap;
  }
  .brand h1 { font-size: 15px; font-weight: 650; letter-spacing: 0.16em; text-transform: uppercase; }
  .brand .sub {
    margin-top: 5px; font-size: 12px; color: var(--text-muted); letter-spacing: 0.02em;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .vin {
    font-variant-numeric: tabular-nums;
    border: 1px solid var(--border); border-radius: 5px;
    padding: 2px 7px; font-size: 11px; color: var(--text-secondary);
    background: var(--surface);
  }
  .controls { display: flex; gap: 10px; align-items: center; }
  .seg {
    display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
    background: var(--surface); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .seg button {
    all: unset; cursor: pointer; font-family: var(--font);
    font-size: 12px; padding: 7px 14px; color: var(--text-muted);
    transition: color .15s, background .15s;
  }
  .seg button:hover { color: var(--text-secondary); }
  .seg button[aria-pressed="true"] { color: var(--text-primary); background: rgba(255,255,255,0.08); }
  .btn {
    all: unset; cursor: pointer; font-family: var(--font);
    font-size: 12px; padding: 7px 14px; color: var(--text-secondary);
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    transition: color .15s, background .15s;
  }
  .btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.08); }

  /* ---------- chart ---------- */
  #chart-wrap { flex: 1; min-height: 0; padding: 4px 10px 0; }
  #chart { width: 100%; height: 100%; display: block; }
  #chart text { font-family: var(--font); }
  .tick-label { fill: var(--text-muted); font-size: 11px; letter-spacing: 0.04em; font-variant-numeric: tabular-nums; }
  .ann-label  { fill: var(--text-secondary); font-size: 11px; font-weight: 570; letter-spacing: 0.02em; }
  .end-label  { fill: var(--text-primary); font-size: 15px; font-weight: 650; }
  .trend-label{ fill: var(--text-muted); font-size: 11px; font-style: italic; }
  .gridline   { stroke: var(--grid); stroke-width: 1; }
  .baseline-l { stroke: var(--baseline); stroke-width: 1; }
  .ann-leader { stroke: var(--series-light); stroke-opacity: 0.45; stroke-width: 1; }
  .crosshair-l{ stroke: var(--crosshair); stroke-width: 1; }

  /* ---------- stats ---------- */
  .bottom { padding: 4px 24px 18px; }
  .tiles {
    display: flex; gap: 10px; align-items: stretch;
    overflow-x: auto; scrollbar-width: none;
    padding-bottom: 2px;
  }
  .tiles::-webkit-scrollbar { display: none; }
  .tile {
    background: var(--surface);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 16px 11px; min-width: 128px; flex: 0 0 auto;
  }
  .tile .label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.03em; margin-bottom: 5px; }
  .tile .value { font-size: 22px; font-weight: 620; letter-spacing: -0.01em; line-height: 1.1; }
  .tile .value small { font-size: 12px; font-weight: 480; color: var(--text-secondary); margin-left: 2px; }
  .tile .delta { margin-top: 4px; font-size: 11px; color: var(--text-muted); }
  .tile .delta .neg { color: var(--delta-bad); }
  .tile .delta .pos { color: var(--delta-good); }
  .tile.hero { padding-right: 22px; }
  .tile.hero .value { font-size: 40px; font-weight: 660; letter-spacing: -0.02em; }
  .tile.hero .value small { font-size: 15px; }
  .hint {
    margin-top: 10px; font-size: 11px; color: var(--text-muted); letter-spacing: 0.02em;
    display: flex; gap: 14px; flex-wrap: wrap;
  }
  .hint span::before { content: "·"; margin-right: 14px; color: rgba(255,255,255,0.2); }
  .hint span:first-child::before { content: none; margin: 0; }

  /* ---------- tooltip ---------- */
  #tooltip {
    position: fixed; top: 0; left: 0; pointer-events: none;
    background: rgba(15, 15, 20, 0.9);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; font-size: 12px; min-width: 168px;
    opacity: 0; transition: opacity .12s;
    will-change: transform; z-index: 10;
  }
  #tooltip.on { opacity: 1; }
  #tooltip .tt-date { color: var(--text-primary); font-weight: 600; margin-bottom: 6px; }
  #tooltip .tt-row { display: flex; justify-content: space-between; gap: 16px; color: var(--text-muted); line-height: 1.65; }
  #tooltip .tt-row b { color: var(--text-secondary); font-weight: 520; font-variant-numeric: tabular-nums; }
  #tooltip .tt-health b { color: var(--text-primary); }

  /* ---------- drop / toast ---------- */
  #drop {
    position: fixed; inset: 0; z-index: 20; display: none;
    align-items: center; justify-content: center;
    background: rgba(13, 13, 16, 0.8); backdrop-filter: blur(6px);
  }
  #drop.on { display: flex; }
  #drop .box {
    border: 1.5px dashed rgba(255,255,255,0.3); border-radius: 16px;
    padding: 46px 64px; font-size: 15px; color: var(--text-secondary);
  }
  #toast {
    position: fixed; left: 50%; bottom: 130px; transform: translateX(-50%);
    background: rgba(15,15,20,0.9); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 16px; font-size: 13px; color: var(--text-secondary);
    opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 30;
  }
  #toast.on { opacity: 1; }

  @media (max-width: 700px) {
    header { padding: 14px 14px 4px; }
    .bottom { padding: 4px 14px 12px; }
    .tile.hero .value { font-size: 30px; }
    .hint span:nth-child(n+2) { display: none; }
  }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="brand">
      <h1>Tesla Battery Health</h1>
      <div class="sub">
        <span id="vin" class="vin"></span>
        <span id="range-note"></span>
      </div>
    </div>
    <div class="controls">
      <div class="seg" role="group" aria-label="Distance unit">
        <button id="unit-km" aria-pressed="true">km</button>
        <button id="unit-mi" aria-pressed="false">mi</button>
      </div>
      <div class="seg" role="group" aria-label="X axis">
        <button id="mode-odo" aria-pressed="true">Odometer</button>
        <button id="mode-time" aria-pressed="false">Time</button>
      </div>
      <button class="btn" id="load-btn">Load CSV</button>
      <input type="file" id="file-input" accept=".csv,text/csv" hidden>
    </div>
  </header>

  <div id="chart-wrap">
    <svg id="chart" role="img" aria-label="Battery usable capacity over distance or time"></svg>
  </div>

  <div class="bottom">
    <div class="tiles" id="tiles"></div>
    <div class="hint">
      <span>Drag &amp; drop a Tessie battery CSV anywhere</span>
      <span>Hover the chart for detail</span>
    </div>
  </div>
</div>

<div id="tooltip"></div>
<div id="drop"><div class="box">Drop your Tessie battery CSV</div></div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script>
/* ================= data ================= */

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return null;
  const parseLine = (l) => {
    const out = []; let cur = '', inQ = false;
    for (let i = 0; i < l.length; i++) {
      const c = l[i];
      if (inQ) {
        if (c === '"') { if (l[i + 1] === '"') { cur += '"'; i++; } else inQ = false; }
        else cur += c;
      } else if (c === '"') inQ = true;
      else if (c === ',') { out.push(cur); cur = ''; }
      else cur += c;
    }
    out.push(cur);
    return out;
  };
  const header = parseLine(lines[0]).map(h => h.toLowerCase());
  const col = (name) => header.findIndex(h => h.includes(name));
  const iT = col('timestamp'), iO = col('odometer'), iR = col('max range'), iC = col('usable capacity');
  if (iT < 0 || iO < 0 || iC < 0) return null;
  const unit = /\(km\)/.test(header[iO]) ? 'km' : 'mi';
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const f = parseLine(lines[i]);
    const date = new Date(f[iT].replace(' ', 'T'));
    const odo = parseFloat(f[iO]), range = iR >= 0 ? parseFloat(f[iR]) : NaN, cap = parseFloat(f[iC]);
    if (isNaN(date) || !isFinite(odo) || !isFinite(cap) || cap <= 1) continue;
    rows.push({ date, odo, range, cap });
  }
  rows.sort((a, b) => a.odo - b.odo);
  return rows.length >= 5 ? { rows, unit } : null;
}

function movingAvg(vals, w) {
  const half = Math.floor(w / 2), out = new Array(vals.length);
  for (let i = 0; i < vals.length; i++) {
    let s = 0, n = 0;
    for (let j = Math.max(0, i - half); j <= Math.min(vals.length - 1, i + half); j++) { s += vals[j]; n++; }
    out[i] = s / n;
  }
  return out;
}

function linreg(xs, ys) {
  const n = xs.length;
  let sx = 0, sy = 0, sxx = 0, sxy = 0;
  for (let i = 0; i < n; i++) { sx += xs[i]; sy += ys[i]; sxx += xs[i] * xs[i]; sxy += xs[i] * ys[i]; }
  const b = (n * sxy - sx * sy) / (n * sxx - sx * sx);
  return { a: (sy - b * sx) / n, b };
}

function analyse(rows) {
  const caps = rows.map(r => r.cap);
  const smooth = movingAvg(caps, 9);
  const baseline = Math.max(...smooth);
  const current = smooth[smooth.length - 1];
  const first = rows[0], last = rows[rows.length - 1];
  const ranges = rows.map(r => r.range).filter(v => isFinite(v) && v > 0);
  const rangeSmooth = movingAvg(rows.map(r => (isFinite(r.range) && r.range > 0) ? r.range : NaN)
    .map((v, i, a) => isFinite(v) ? v : a[i - 1] ?? ranges[0]), 9);
  // trend over the most recent half of the span (steadier than the early break-in drop)
  const midOdo = first.odo + (last.odo - first.odo) / 2;
  const recentIdx = rows.map((r, i) => i).filter(i => rows[i].odo >= midOdo);
  const reg = linreg(recentIdx.map(i => rows[i].odo), recentIdx.map(i => smooth[i]));
  const regAll = linreg(rows.map(r => r.odo), smooth);
  // same regressions against time, in years
  const years = rows.map(r => +r.date / (1000 * 3600 * 24 * 365.25));
  const midT = years[0] + (years[years.length - 1] - years[0]) / 2;
  const recentTIdx = rows.map((r, i) => i).filter(i => years[i] >= midT);
  const regT = linreg(recentTIdx.map(i => years[i]), recentTIdx.map(i => smooth[i]));
  const regTAll = linreg(years, smooth);
  return {
    smooth, baseline, current,
    healthPct: current / baseline * 100,
    lostKwh: baseline - current,
    rangeNow: rangeSmooth[rangeSmooth.length - 1],
    rangePeak: Math.max(...rangeSmooth),
    milesTracked: last.odo - first.odo,
    monthsTracked: (last.date - first.date) / (1000 * 3600 * 24 * 30.44),
    trendRecent: reg.b * 10000,       // kWh per 10k distance units, recent half
    trendAll: regAll.b * 10000,
    trendRecentYr: regT.b,            // kWh per year, recent half
    trendAllYr: regTAll.b,
    reg,
  };
}

/* ================= formatting ================= */

const fmtInt = new Intl.NumberFormat('en-US');
const fmt1 = new Intl.NumberFormat('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
const fmtDate = new Intl.DateTimeFormat('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
const fmtMonth = new Intl.DateTimeFormat('en-US', { month: 'short' });
const kFmt = v => v >= 10000 ? (v / 1000).toFixed(v % 1000 === 0 ? 0 : 1).replace(/\.0$/, '') + 'k' : fmtInt.format(v);

function niceTicks(min, max, target, steps = [1, 2, 2.5, 5, 10]) {
  const span = max - min;
  const mag = Math.pow(10, Math.floor(Math.log10(span / target)));
  let best = mag;
  for (const s of steps) { if (span / (s * mag) >= target - 2) best = s * mag; }
  const ticks = [];
  for (let v = Math.ceil(min / best) * best; v <= max + 1e-9; v += best) ticks.push(v);
  return ticks;
}

/* ================= chart (pure SVG) ================= */

const svg = document.getElementById('chart');
const wrap = document.getElementById('chart-wrap');
const R = v => Math.round(v * 100) / 100;

function smoothPathD(p) {
  if (p.length < 3) return 'M' + p.map(q => `${R(q.x)},${R(q.y)}`).join('L');
  let d = `M${R(p[0].x)},${R(p[0].y)}`;
  for (let i = 0; i < p.length - 1; i++) {
    const p0 = p[Math.max(0, i - 1)], p1 = p[i], p2 = p[i + 1], p3 = p[Math.min(p.length - 1, i + 2)];
    d += `C${R(p1.x + (p2.x - p0.x) / 6)},${R(p1.y + (p2.y - p0.y) / 6)},` +
         `${R(p2.x - (p3.x - p1.x) / 6)},${R(p2.y - (p3.y - p1.y) / 6)},${R(p2.x)},${R(p2.y)}`;
  }
  return d;
}

const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;');
let chart = null;   // { pts, rows, unit, stats, mode, plot, introTl }

function renderChart(rows, unit, stats, mode, anim) {
  const W = wrap.clientWidth - 0, H = wrap.clientHeight - 0;
  if (W < 60 || H < 60) return;
  const prev = chart;
  chart?.introTl?.kill();
  gsap.killTweensOf('#chart *');

  const Mg = { l: 58, r: 74, t: 44, b: 30 };
  const plotW = W - Mg.l - Mg.r, plotH = H - Mg.t - Mg.b;
  const first = rows[0], last = rows[rows.length - 1];

  const capMin = Math.min(...rows.map(r => r.cap)), capMax = Math.max(...rows.map(r => r.cap));
  const yLo = Math.floor(capMin) - 0.6, yHi = Math.ceil(capMax) + 0.6;
  const projPad = mode === 'odo' ? (last.odo - first.odo) * 0.16 : 0;
  const x0 = mode === 'odo' ? first.odo : +first.date;
  const x1 = mode === 'odo' ? last.odo + projPad : +last.date;
  const X = v => Mg.l + (v - x0) / (x1 - x0) * plotW;
  const Y = c => Mg.t + (1 - (c - yLo) / (yHi - yLo)) * plotH;
  const xOf = r => mode === 'odo' ? r.odo : +r.date;
  const baseY = Mg.t + plotH;

  const pts = rows.map((r, i) => ({ x: X(xOf(r)), ySm: Y(stats.smooth[i]), yRaw: Y(r.cap) }));
  const smPts = pts.map(p => ({ x: p.x, y: p.ySm }));
  const lineD = smoothPathD(smPts);
  const areaD = `${lineD}L${R(smPts[smPts.length - 1].x)},${R(baseY)}L${R(smPts[0].x)},${R(baseY)}Z`;

  /* ----- axes ----- */
  let axes = '';
  const yTicks = niceTicks(yLo, yHi, 4, [1, 2, 5]).filter(v => v > yLo + 0.15 && v < yHi - 0.15);
  for (const v of yTicks) {
    const y = R(Y(v));
    axes += `<line class="gridline" x1="${Mg.l}" y1="${y}" x2="${Mg.l + plotW}" y2="${y}"/>` +
      `<text class="tick-label" x="${Mg.l - 10}" y="${y + 3.5}" text-anchor="end">${v} kWh</text>`;
  }
  let xTickVals = [];
  if (mode === 'odo') {
    xTickVals = niceTicks(first.odo, last.odo, 6).map(v => ({ v, t: kFmt(Math.round(v)) + ' ' + unit }));
  } else {
    const d = new Date(first.date); d.setDate(1); d.setMonth(d.getMonth() + 1);
    const spanM = (last.date - first.date) / (1000 * 3600 * 24 * 30.44);
    const stepM = Math.max(1, Math.round(spanM / 7));
    for (; d <= last.date; d.setMonth(d.getMonth() + stepM)) {
      xTickVals.push({ v: +d, t: `${fmtMonth.format(d)} ’${String(d.getFullYear()).slice(2)}` });
    }
  }
  for (const { v, t } of xTickVals) {
    const x = R(X(v));
    axes += `<line class="gridline" x1="${x}" y1="${baseY}" x2="${x}" y2="${baseY + 5}"/>` +
      `<text class="tick-label" x="${x}" y="${baseY + 19}" text-anchor="middle">${t}</text>`;
  }
  axes += `<line class="baseline-l" x1="${Mg.l}" y1="${baseY}" x2="${Mg.l + plotW}" y2="${baseY}"/>`;

  /* ----- trend projection ----- */
  let proj = '';
  if (mode === 'odo' && projPad > 0) {
    const yP = R(Y(stats.reg.a + stats.reg.b * (last.odo + projPad)));
    const pLast = smPts[smPts.length - 1];
    proj = `<line x1="${R(pLast.x)}" y1="${R(pLast.y)}" x2="${Mg.l + plotW}" y2="${yP}"
      stroke="var(--text-muted)" stroke-opacity="0.6" stroke-width="1" stroke-dasharray="5 4"/>
      <text class="trend-label" x="${Mg.l + plotW + 6}" y="${yP + 3.5}">trend</text>`;
  }

  /* ----- dots ----- */
  const dots = pts.map(p =>
    `<circle class="dot" cx="${R(p.x)}" cy="${R(p.yRaw)}" r="2" fill="var(--dot)" fill-opacity="0.75"/>`).join('');

  /* ----- annotations: peak & outliers ----- */
  const annModels = [];
  const peakIdx = stats.smooth.indexOf(Math.max(...stats.smooth));
  annModels.push({ i: peakIdx, y: pts[peakIdx].ySm, up: true, main: true,
    text: `peak ${fmt1.format(stats.baseline)} kWh` });
  const residuals = rows.map((r, i) => r.cap - stats.smooth[i]);
  const sd = Math.sqrt(residuals.reduce((s, v) => s + v * v, 0) / residuals.length);
  const thresh = Math.max(0.3, 2.4 * sd);
  const order = residuals.map((_, i) => i).sort((a, b) => Math.abs(residuals[b]) - Math.abs(residuals[a]));
  for (const i of order) {
    if (Math.abs(residuals[i]) < thresh || annModels.length >= 4) break;
    if (annModels.some(m => Math.abs(pts[i].x - pts[m.i].x) < 90)) continue;
    annModels.push({ i, y: pts[i].yRaw, up: residuals[i] > 0, main: false,
      text: `${residuals[i] > 0 ? '+' : '−'}${fmt1.format(Math.abs(residuals[i]))} kWh outlier` });
  }
  let anns = '';
  for (const m of annModels) {
    const p = pts[m.i], len = m.main ? 34 : 26;
    const yEnd = m.up ? m.y - len : m.y + len;
    const tx = Math.min(Math.max(p.x, Mg.l + 40), Mg.l + plotW - 46);
    anns += `<g class="ann">
      <line class="ann-leader" x1="${R(p.x)}" y1="${R(m.up ? m.y - 5 : m.y + 5)}" x2="${R(p.x)}" y2="${R(yEnd)}"/>
      <circle cx="${R(p.x)}" cy="${R(m.y)}" r="3.4" fill="none" stroke="var(--series-light)" stroke-width="1.2"/>
      <text class="ann-label" x="${R(tx)}" y="${R(m.up ? yEnd - 5 : yEnd + 13)}" text-anchor="middle">${esc(m.text)}</text>
    </g>`;
  }

  /* ----- end marker ----- */
  const pe = pts[pts.length - 1];
  const endG = `<g class="endg">
    <circle id="end-halo" cx="${R(pe.x)}" cy="${R(pe.ySm)}" r="5" fill="none" stroke="var(--series)" stroke-width="1.5"/>
    <circle cx="${R(pe.x)}" cy="${R(pe.ySm)}" r="4" fill="#cde2fb" stroke="var(--bg)" stroke-width="1.5"/>
    <text class="end-label" x="${R(pe.x)}" y="${R(pe.ySm - 14)}" text-anchor="middle">${stats.healthPct.toFixed(1)}%</text>
  </g>`;

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML = `
    <defs>
      <linearGradient id="strokeGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="var(--series-light)"/>
        <stop offset="1" stop-color="var(--series)"/>
      </linearGradient>
      <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="var(--series)" stop-opacity="0.22"/>
        <stop offset="1" stop-color="var(--series)" stop-opacity="0"/>
      </linearGradient>
      <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="5"/>
      </filter>
      <clipPath id="sweep"><rect id="sweep-rect" x="${Mg.l - 4}" y="0" width="${plotW + 12}" height="${H}"/></clipPath>
    </defs>
    <g id="g-axes">${axes}</g>
    <g clip-path="url(#sweep)">
      <path id="area" d="${areaD}" fill="url(#areaGrad)"/>
      <path id="line-glow" d="${lineD}" fill="none" stroke="var(--series)" stroke-width="5"
        stroke-opacity="0.45" filter="url(#glow)"/>
      <path id="line" d="${lineD}" fill="none" stroke="url(#strokeGrad)" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"/>
      <g id="g-dots">${dots}</g>
    </g>
    <g id="g-proj">${proj}</g>
    <g id="g-anns">${anns}</g>
    ${endG}
    <g id="g-hover" style="visibility:hidden">
      <line id="hover-line" class="crosshair-l" y1="${Mg.t}" y2="${baseY}"/>
      <circle id="hover-dot" r="4.5" fill="#fff" stroke="var(--bg)" stroke-width="1.5"/>
    </g>`;

  chart = { pts, rows, unit, stats, mode, plot: { Mg, plotW, plotH, baseY, W, H } };

  /* ----- halo pulse (always running) ----- */
  gsap.fromTo('#end-halo', { attr: { r: 5 }, opacity: 0.8 },
    { attr: { r: 16 }, opacity: 0, duration: 1.8, ease: 'power1.out', repeat: -1, repeatDelay: 0.4 });

  /* ----- entrance animations ----- */
  if (anim === 'sweep') {
    const lineEl = svg.querySelector('#line');
    const len = lineEl.getTotalLength();
    const tl = gsap.timeline();
    chart.introTl = tl;
    tl.from('#g-axes', { opacity: 0, duration: 0.6, ease: 'none' }, 0)
      .fromTo(['#line', '#line-glow'], { strokeDasharray: len, strokeDashoffset: len },
        { strokeDashoffset: 0, duration: 1.7, ease: 'power2.inOut', clearProps: 'strokeDasharray,strokeDashoffset' }, 0.15)
      .fromTo('#sweep-rect', { attr: { width: 0 } },
        { attr: { width: plotW + 12 }, duration: 1.7, ease: 'power2.inOut' }, 0.15)
      .from('#area', { opacity: 0, duration: 0.6, ease: 'none' }, 0.3);
    for (const [k, m] of annModels.entries()) {
      const frac = (pts[m.i].x - Mg.l) / plotW;
      tl.from(svg.querySelectorAll('.ann')[k], { opacity: 0, y: m.up ? 8 : -8, duration: 0.5, ease: 'power2.out' },
        0.25 + 1.6 * frac);
    }
    tl.from('.endg', { opacity: 0, duration: 0.4 }, 1.75)
      .from('#g-proj', { opacity: 0, duration: 0.6 }, 1.85);
  } else if (anim === 'morph' && prev && prev.pts.length === pts.length) {
    const from = prev.pts, to = pts;
    const lineEl = svg.querySelector('#line'), glowEl = svg.querySelector('#line-glow'),
      areaEl = svg.querySelector('#area'), dotEls = svg.querySelectorAll('.dot');
    const prox = { k: 0 };
    gsap.to(prox, {
      k: 1, duration: 0.9, ease: 'power3.inOut',
      onUpdate() {
        const k = prox.k;
        const ip = to.map((p, i) => ({
          x: from[i].x + (p.x - from[i].x) * k,
          ySm: from[i].ySm + (p.ySm - from[i].ySm) * k,
          yRaw: from[i].yRaw + (p.yRaw - from[i].yRaw) * k,
        }));
        const d = smoothPathD(ip.map(p => ({ x: p.x, y: p.ySm })));
        lineEl.setAttribute('d', d);
        glowEl.setAttribute('d', d);
        areaEl.setAttribute('d', `${d}L${R(ip[ip.length - 1].x)},${R(baseY)}L${R(ip[0].x)},${R(baseY)}Z`);
        dotEls.forEach((c, i) => { c.setAttribute('cx', R(ip[i].x)); c.setAttribute('cy', R(ip[i].yRaw)); });
      },
    });
    gsap.from(['#g-axes', '#g-anns', '#g-proj', '.endg'], { opacity: 0, duration: 0.55, ease: 'none', delay: 0.35 });
  }
}

/* ================= HUD ================= */

function deltaSpan(v, unitStr) {
  const cls = v === 0 ? '' : v > 0 ? 'pos' : 'neg';
  const sign = v > 0 ? '+' : '−';
  return `<span class="${cls}">${sign}${fmt1.format(Math.abs(v))}${unitStr}</span>`;
}

function renderStats(rows, unit, stats, vin, mode) {
  const last = rows[rows.length - 1];
  document.getElementById('vin').textContent = vin || 'Tessie export';
  document.getElementById('range-note').textContent =
    `${fmtDate.format(rows[0].date)} – ${fmtDate.format(last.date)} · ${rows.length} readings`;
  const tiles = [
    {
      hero: true, label: 'Battery health',
      value: `${stats.healthPct.toFixed(1)}<small>%</small>`,
      delta: `${deltaSpan(-(100 - stats.healthPct), '%')} vs peak recorded`,
    },
    {
      label: 'Usable capacity',
      value: `${fmt1.format(stats.current)}<small>kWh</small>`,
      delta: `${deltaSpan(-stats.lostKwh, ' kWh')} vs ${fmt1.format(stats.baseline)} peak`,
    },
    {
      label: 'Est. max range',
      value: `${Math.round(stats.rangeNow)}<small>${unit}</small>`,
      delta: `${deltaSpan(stats.rangeNow - stats.rangePeak, ` ${unit}`)} vs ${Math.round(stats.rangePeak)} peak`,
    },
    {
      label: 'Odometer',
      value: `${fmtInt.format(Math.round(last.odo))}<small>${unit}</small>`,
      delta: `${kFmt(Math.round(stats.milesTracked))} ${unit} over ${Math.round(stats.monthsTracked)} mo tracked`,
    },
    mode === 'time' ? {
      label: 'Degradation trend',
      value: `${fmt1.format(Math.abs(stats.trendRecentYr))}<small>kWh / yr</small>`,
      delta: `recent · ${fmt1.format(Math.abs(stats.trendAllYr))} kWh/yr overall`,
    } : {
      label: 'Degradation trend',
      value: `${fmt1.format(Math.abs(stats.trendRecent))}<small>kWh / 10k ${unit}</small>`,
      delta: `recent · ${fmt1.format(Math.abs(stats.trendAll))} kWh/10k ${unit} overall`,
    },
  ];
  document.getElementById('tiles').innerHTML = tiles.map(t => `
    <div class="tile${t.hero ? ' hero' : ''}">
      <div class="label">${t.label}</div>
      <div class="value">${t.value}</div>
      <div class="delta">${t.delta}</div>
    </div>`).join('');
}

/* ================= hover ================= */

const tooltip = document.getElementById('tooltip');
const hoverG = () => svg.querySelector('#g-hover');

svg.addEventListener('pointermove', (e) => {
  if (!chart) return;
  const { pts, rows, unit, stats, plot } = chart;
  const rect = svg.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  if (mx < plot.Mg.l - 8 || mx > plot.Mg.l + plot.plotW + 8 || my < plot.Mg.t - 8 || my > plot.baseY + 8) {
    hideHover(); return;
  }
  let best = 0, bestD = Infinity;
  for (let i = 0; i < pts.length; i++) {
    const d = Math.abs(pts[i].x - mx);
    if (d < bestD) { bestD = d; best = i; }
  }
  const p = pts[best], r = rows[best];
  const g = hoverG();
  g.style.visibility = 'visible';
  const hl = g.querySelector('#hover-line'), hd = g.querySelector('#hover-dot');
  hl.setAttribute('x1', R(p.x)); hl.setAttribute('x2', R(p.x));
  hd.setAttribute('cx', R(p.x)); hd.setAttribute('cy', R(p.yRaw));
  tooltip.innerHTML = `
    <div class="tt-date">${fmtDate.format(r.date)}</div>
    <div class="tt-row tt-health"><span>Health</span><b>${(r.cap / stats.baseline * 100).toFixed(1)}%</b></div>
    <div class="tt-row"><span>Capacity</span><b>${fmt1.format(r.cap)} kWh</b></div>
    ${isFinite(r.range) && r.range > 0 ? `<div class="tt-row"><span>Max range</span><b>${Math.round(r.range)} ${unit}</b></div>` : ''}
    <div class="tt-row"><span>Odometer</span><b>${fmtInt.format(Math.round(r.odo))} ${unit}</b></div>`;
  const w = window.innerWidth, h = window.innerHeight;
  const tx = Math.min(e.clientX + 18, w - 200);
  const ty = Math.min(Math.max(12, e.clientY - 40), h - tooltip.offsetHeight - 12);
  tooltip.style.transform = `translate(${tx}px, ${ty}px)`;
  tooltip.classList.add('on');
});
svg.addEventListener('pointerleave', hideHover);
function hideHover() {
  tooltip.classList.remove('on');
  const g = hoverG();
  if (g) g.style.visibility = 'hidden';
}

/* ================= app wiring ================= */

let native = null, currentVin = '', mode = 'odo', dispUnit = 'km';
const KM_PER_MI = 1.609344;

function refresh(anim = 'none') {
  if (!native) return;
  const f = native.unit === dispUnit ? 1 : (native.unit === 'mi' ? KM_PER_MI : 1 / KM_PER_MI);
  const rows = f === 1 ? native.rows
    : native.rows.map(r => ({ ...r, odo: r.odo * f, range: r.range * f }));
  const stats = analyse(rows);
  renderStats(rows, dispUnit, stats, currentVin, mode);
  renderChart(rows, dispUnit, stats, mode, anim);
}

function load(rows, unit, vin, animateTiles = false) {
  native = { rows, unit };
  currentVin = vin;
  refresh('sweep');
  if (animateTiles) gsap.from('.tile', { y: 14, opacity: 0, stagger: 0.06, duration: 0.5, ease: 'power2.out', delay: 0.2 });
}

const modeBtns = { odo: document.getElementById('mode-odo'), time: document.getElementById('mode-time') };
function setMode(m) {
  if (m === mode || !native) return;
  mode = m;
  modeBtns.odo.setAttribute('aria-pressed', String(m === 'odo'));
  modeBtns.time.setAttribute('aria-pressed', String(m === 'time'));
  refresh('morph');
}
modeBtns.odo.addEventListener('click', () => setMode('odo'));
modeBtns.time.addEventListener('click', () => setMode('time'));

const unitBtns = { km: document.getElementById('unit-km'), mi: document.getElementById('unit-mi') };
function setUnit(u) {
  if (u === dispUnit || !native) return;
  dispUnit = u;
  unitBtns.km.setAttribute('aria-pressed', String(u === 'km'));
  unitBtns.mi.setAttribute('aria-pressed', String(u === 'mi'));
  refresh('none');
}
unitBtns.km.addEventListener('click', () => setUnit('km'));
unitBtns.mi.addEventListener('click', () => setUnit('mi'));

let resizeT = 0;
new ResizeObserver(() => {
  clearTimeout(resizeT);
  resizeT = setTimeout(() => refresh('none'), 120);
}).observe(wrap);

const toast = document.getElementById('toast');
let toastT = 0;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('on');
  clearTimeout(toastT);
  toastT = setTimeout(() => toast.classList.remove('on'), 3200);
}

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    const parsed = parseCSV(String(reader.result));
    if (!parsed) { showToast('Could not read that file — expected a Tessie battery-health CSV.'); return; }
    const vinMatch = file.name.match(/[A-HJ-NPR-Z0-9]{17}/i);
    load(parsed.rows, parsed.unit, vinMatch ? vinMatch[0].toUpperCase() : file.name.replace(/\.csv$/i, ''));
    showToast(`Loaded ${parsed.rows.length} readings.`);
  };
  reader.readAsText(file);
}

document.getElementById('load-btn').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change', (e) => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
  e.target.value = '';
});

const drop = document.getElementById('drop');
let dragDepth = 0;
window.addEventListener('dragenter', (e) => { e.preventDefault(); dragDepth++; drop.classList.add('on'); });
window.addEventListener('dragleave', (e) => { e.preventDefault(); if (--dragDepth <= 0) { dragDepth = 0; drop.classList.remove('on'); } });
window.addEventListener('dragover', (e) => e.preventDefault());
window.addEventListener('drop', (e) => {
  e.preventDefault();
  dragDepth = 0;
  drop.classList.remove('on');
  const f = e.dataTransfer.files?.[0];
  if (f) loadFile(f);
});

/* boot with the embedded sample */
{
  const parsed = parseCSV(document.getElementById('default-csv').textContent);
  if (parsed) load(parsed.rows, parsed.unit, 'LRW3F7EB4MCXXXXXX', true);
}
</script>
</body>
